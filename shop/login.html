<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechZone | Login e Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-shell">
    <section class="auth-brand">
      <p class="eyebrow">E-commerce acadêmico</p>
      <h1>TechZone</h1>
      <p>Tecnologia de ponta, ofertas exclusivas e os melhores produtos em um só lugar. Entre agora e descubra uma nova experiência em inovação.</p>
    </section>

    <section class="auth-panel" aria-label="Acesso ao sistema">
      <div class="tabs" role="tablist">
        <button class="tab active" type="button" data-auth-tab="login">Entrar</button>
        <button class="tab" type="button" data-auth-tab="cadastro">Cadastrar</button>
      </div>

      <form id="login-form" class="form-stack">
        <div>
          <h2>Acesse sua conta</h2>
        </div>
        <label>Nome de usuário
          <input id="login-user" autocomplete="username" required>
        </label>
        <label>Senha
          <input id="login-pass" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary full" type="submit">Entrar</button>
      </form>

      <form id="register-form" class="form-stack hidden">
        <div>
          <h2>Criar cadastro</h2>
        </div>
        <label>Nome completo
          <input id="reg-name" autocomplete="name" required>
        </label>
        <label>E-mail
          <input id="reg-email" type="email" placeholder="nome@gmail.com" autocomplete="email" required>
        </label>
        <label>Telefone
          <input id="reg-phone" placeholder="(11) 99999-9999" autocomplete="tel" inputmode="numeric" data-phone-mask required>
        </label>
        <label>Nome de usuário
          <input id="reg-user" autocomplete="username" required>
        </label>
        <label>Senha
          <input id="reg-pass" type="password" autocomplete="new-password" minlength="3" required>
        </label>
        <button class="btn primary full" type="submit">Cadastrar e entrar</button>
      </form>
    </section>
  </main>

  <div id="toast-root" aria-live="polite"></div>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
